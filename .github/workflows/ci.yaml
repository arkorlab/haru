name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          standalone: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      # Migration drift gate: tests run the committed migrations while
      # deploys use db:push from the schema files; a schema edit
      # without a regenerated migration must fail here, not diverge.
      - run: pnpm db:generate && git diff --exit-code packages/db/drizzle
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
