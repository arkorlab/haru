name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Nothing pushes back to the repo; do not leave credentials
          # on disk for later steps (zizmor: artipacked).
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          standalone: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      # Build BEFORE the drift gate: drizzle-kit loads the schema,
      # whose runtime imports resolve to workspace dist/ files.
      - run: pnpm build
      # Migration drift gate: tests run the committed migrations while
      # deploys use db:push from the schema files; a schema edit
      # without a regenerated migration must fail here, not diverge.
      # drizzle-kit exits 0 even when generate errors (verified), so
      # the gate also greps its output for failures.
      - name: Migration drift gate
        run: |
          # The default runner shell is `bash -e` WITHOUT pipefail, so a
          # db:generate crash whose output matches neither grep pattern
          # would otherwise exit through tee's 0 and pass the gate green.
          set -o pipefail
          pnpm db:generate 2>&1 | tee /tmp/db-generate.log
          if grep -qE "MODULE_NOT_FOUND|^Error" /tmp/db-generate.log; then
            echo "drizzle-kit generate reported an error (it exits 0 on failures)"
            exit 1
          fi
          # --porcelain catches BOTH modified and untracked files (a
          # brand-new migration), with no index side effects, unlike a
          # plain `git diff` (tracked only) or `git add -N` (leaves
          # intent-to-add markers). --untracked-files=normal is explicit
          # so a runner-level status.showUntrackedFiles=no cannot silently
          # neuter the untracked-file detection. Empty output = no drift.
          drift="$(git status --porcelain --untracked-files=normal packages/db/drizzle)"
          if [ -n "$drift" ]; then
            echo "drizzle migrations are out of date; run pnpm db:generate:"
            echo "$drift"
            exit 1
          fi
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  # Integration lane: the same DB-backed suites against a real
  # Postgres. PGlite (the default lane above) is single-connection and
  # serializes the Promise.all CAS races; this lane exercises row-lock
  # waits and predicate re-evaluation under true concurrency.
  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      HARU_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Nothing pushes back to the repo; do not leave credentials
          # on disk for later steps (zizmor: artipacked).
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          standalone: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec turbo run test --filter=@haru/db --filter=@haru/server
